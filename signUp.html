<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us - BLJ Study Hub</title>
    <!-- External Resources -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/Login.css"> <!-- Reused for consistency -->
    <link rel="icon" href="assets/image/Gemini.png">
</head>

<body>
    <section class="signUp-form">
        <!-- Logo Centered Automatically by CSS -->
        <img src="assets/image/Gemini.png" alt="BLJ Logo" class="auth-logo">

        <h2>Create Account</h2>

        <form id="signUpForm" action="php/signup.php" method="POST">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label for="newName">First Name</label>
                    <input type="text" id="newName" name="newName" placeholder="John" required>
                </div>
                <div class="input-group">
                    <label for="lastname">Last Name</label>
                    <input type="text" id="lastname" name="lastname" placeholder="Doe" required>
                </div>
            </div>

            <div class="input-group">
                <label for="newUsername">Choose Username</label>
                <input type="text" id="newUsername" name="newUsername" placeholder="johndoe123" required>
            </div>

            <div class="input-group">
                <label for="newPassword">Secret Password</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required>
            </div>

            <button type="submit">Create Account</button>

            <div class="divider">
                <span>Or register with</span>
            </div>

            <div class="social-login">
                <a href="#" aria-label="Sign Up with Google"><i class="fa-brands fa-google"></i></a>
                <a href="#" aria-label="Sign Up with Facebook"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" aria-label="Sign Up with Twitter"><i class="fa-brands fa-twitter"></i></a>
            </div>
        </form>

        <p class="login-link">Already a member? <a href="Login.html">Log In Here</a></p>
        <p class="back-link" style="margin-top: 15px;"><a href="index.html">← Explore More</a></p>
    </section>

    <!-- Script Links -->
    <script src="assets/js/signUp.js"></script>
</body>

</html>
