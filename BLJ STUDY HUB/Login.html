<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/Login.css">
    <link rel="icon" href="assets/image/Gemini.png">
    <title>Login - BLJ Study Hub</title>
</head>

<body>
    <section class="login-form">
        <img src="assets/image/Gemini.png" alt="BLJ Logo" style="
            position: relative;
            top: 50%;
            left: 50%;
            transform: translate(-60%, -10%);
            justify-content: center;
            align-items: center;
            padding: 100px auto;
            width: 100px; 
            height: 100px; 
            object-fit: cover; 
            border-radius: 50%; 
            border: 4px solid black; 
            margin: 10px; 
            display: flex; 
            vertical-align: center;
            ">
        <h2>BLJ Study Hub</h2>

        <form id="loginForm" action="php/login.php" method="POST">
            <div class="input-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Login</button>
            <!-- Add any additional elements here -->
            <div class="divider">
                <span>Or sign up with</span>
            </div>
            <div class="social-login">
                <a href="#" aria-label="Sign Up with Google">
                    <i class="fa-brands fa-google"></i>
                </a>
                <a href="#" aria-label="Sign Up with Facebook">
                    <i class="fa-brands fa-facebook"></i>
                </a>
                <a href="#" aria-label="Sign Up with Twitter">
                    <i class="fa-brands fa-twitter"></i>
                </a>
            </div>
        </form>
        <p class="signup-link">Don't have an account? <a href="signUp.html">Sign Up</a></p>
    </section>
</body>
<script src="assets/js/Login.js"></script>

</html>
