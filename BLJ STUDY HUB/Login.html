<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BLJ Study Hub</title>
    <!-- External Resources -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/Login.css">
    <link rel="icon" href="assets/image/Gemini.png">
</head>

<body>
    <section class="login-form">
        <!-- Logo Centered Automatically by Login.css -->
        <img src="assets/image/Gemini.png" alt="BLJ Logo" class="auth-logo">

        <h2>BLJ Study Hub</h2>

        <form id="loginForm" action="php/login.php" method="POST">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Log In</button>

            <div class="divider">
                <span>Or connect with</span>
            </div>

            <div class="social-login">
                <a href="#" aria-label="Login with Google"><i class="fa-brands fa-google"></i></a>
                <a href="#" aria-label="Login with Facebook"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" aria-label="Login with Twitter"><i class="fa-brands fa-twitter"></i></a>
            </div>
        </form>

        <p class="signup-link">Don't have an account? <a href="signUp.html">Sign Up Now</a></p>
    </section>

    <!-- Script Links -->
    <script src="assets/js/Login.js"></script>
</body>

</html>
