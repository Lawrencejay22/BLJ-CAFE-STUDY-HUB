<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Gateway - BLJ Study Hub</title>
    <!-- External Resources -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/Login.css">
    <link rel="icon" href="assets/image/Gemini.png">
</head>

<body>
    <section class="login-form">
        <!-- Logo Centered Automatically by CSS -->
        <img src="assets/image/Gemini.png" alt="BLJ Admin" class="auth-logo">

        <h2>Admin Gateway</h2>

        <form id="adminLoginForm" action="php/login.php" method="POST">
            <div class="input-group">
                <label for="adminUsername">Admin Username</label>
                <input type="text" id="adminUsername" name="admin_username" placeholder="Root access..." required>
            </div>

            <div class="input-group">
                <label for="adminPassword">Master Password</label>
                <input type="password" id="adminPassword" name="admin_password" placeholder="••••••••" required>
            </div>

            <!-- Important: Source flag for backend routing -->
            <input type="hidden" name="source" value="admin">

            <button type="submit" style="background: linear-gradient(135deg, #ef4444, #b91c1c);">Authorize
                Access</button>
        </form>

        <p class="back-link" style="margin-top: 30px;"><a href="index.html">← Return to Safety</a></p>
    </section>

    <!-- Script Links -->
    <script src="assets/js/admin-login.js"></script>
</body>

</html>
