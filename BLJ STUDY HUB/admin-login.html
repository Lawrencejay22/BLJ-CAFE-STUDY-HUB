<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - BLJ Study Hub</title>
    <link rel="stylesheet" href="assets/css/Login.css">
    <link rel="icon" href="assets/image/Gemini.png">
</head>

<body>
    <section class="login-form">
        <h2><i class="fas fa-coffee"> BLJ Study Hub Admin</i></h2>
        <form id="adminLoginForm" action="php/login.php" method="POST">
            <div class="input-group">
                <label for="adminUsername">Username:</label>
                <input type="text" id="adminUsername" name="admin_username" required>
            </div>
            <div class="input-group">
                <label for="adminPassword">Password:</label>
                <input type="password" id="adminPassword" name="admin_password" required>
            </div>
            <input type="hidden" name="source" value="admin">
            <button type="submit">Login</button>
        </form>
        <p class="back-link"><a href="index.html">← Back to Home</a></p>
    </section>
</body>
<script src="assets/js/admin-login.js"></script>

</html>
