<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Reservation - BLJ Study Hub</title>
    <link rel="stylesheet" href="assets/css/book.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="assets/image/Gemini.png">
</head>

<body>

    <header>
        <h1 class="title"><img src="assets/image/Gemini.png" alt="Logo" class="brand-logo"> Room Reservation</h1>
        <nav>
            <ul class="nav-icons">
                <li><a href="index.html" title="Home"><i class="fas fa-home"></i></a></li>
                <li><a href="cart.html" title="Cart"><i class="fas fa-shopping-cart"></i></a></li>
            </ul>
        </nav>
    </header>

    <main class="content booking-main">
        <div class="booking-container">
            <div class="booking-card">
                <h2><i class="fas fa-laptop-house"></i> Book a Study Space</h2>
                <p>Reserve your private room or group study area.</p>

                <form id="bookingForm" action="php/booking.php" method="POST">
                    <div class="input-group">
                        <label for="roomType">Select Room Type:</label>
                        <select id="roomType" name="roomType" required>
                            <option value="" disabled selected>Choose a room...</option>
                            <option value="Quiet Solo Pod">Quiet Solo Pod (1 Person)</option>
                            <option value="Group Study Room">Group Study Room (4-6 People)</option>
                            <option value="Conference Room">Conference Room (10+ People)</option>
                            <option value="Premium Fiber Wifi">Premium Fiber Wifi (Daily)</option>
                            <option value="Printing Service Room">Printing (B&W or Color)</option>
                            <option value="Nap Room Access">Nap Room Access (1 Hour)</option>
                            <option value="Charging Station/Room">Charging Station/Room</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="date">Reservation Date:</label>
                            <input type="date" id="date" name="date" required>
                        </div>
                        <div class="input-group">
                            <label for="time">Check-in Time:</label>
                            <input type="time" id="time" name="time" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="duration">Duration (Hours):</label>
                            <input type="number" id="duration" name="duration" min="1" max="12" placeholder="Hours"
                                required>
                        </div>
                        <div class="input-group">
                            <label for="pax">Number of Pax:</label>
                            <input type="number" id="pax" name="pax" min="1" max="20" placeholder="People" required>
                        </div>
                    </div>

                    <button type="submit" class="cart-btn booking-submit">
                        <i class="fas fa-calendar-check"></i> Confirm Reservation
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="assets/js/book.js"></script>
</body>

</html>
